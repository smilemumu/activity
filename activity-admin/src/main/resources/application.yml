server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/activity_admin?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.activityConfig.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: YWN0aXZpdHktYWRtaW4tand0LXNlY3JldC1rZXktMjAyNA==
  expiration: 86400000

file:
  upload:
    path: ./uploads/
